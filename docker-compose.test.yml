services:
  nextjs:
    build:
      context: .
      dockerfile: tests/Dockerfile.combined
    ports:
      - "3098:3098"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3098"]
      interval: 5s
      timeout: 3s
      retries: 15

  playwright:
    image: mcr.microsoft.com/playwright:v1.52.0-noble
    depends_on:
      nextjs:
        condition: service_healthy
    working_dir: /app
    volumes:
      - ./tests/src/e2e:/app/src/e2e
      - ./tests/playwright.config.ts:/app/playwright.config.ts
    environment:
      - BASE_URL=http://nextjs:3098
    command: >
      bash -c "npm init -y > /dev/null 2>&1 &&
               npm install @playwright/test@1.52.0 > /dev/null 2>&1 &&
               npx playwright test"
